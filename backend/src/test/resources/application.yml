spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop   # Hibernate tự gen bảng từ @Entity, xóa sau khi test xong
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false            # Tắt Flyway — không cần migration trong Unit/Slice Test
