spring:
  application:
    name: api-health-check-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/api_health_check}
    username: ${DB_USERNAME:api_health_user}
    password: ${DB_PASSWORD:api_health_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
