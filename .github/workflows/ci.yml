name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Verify code formatting
      run: mvn spotless:check

    - name: Run Checkstyle
      run: mvn checkstyle:check

    - name: Build and Test with JaCoCo Coverage
      run: mvn clean verify
      
    - name: Verify Swagger Docs consistency
      run: |
        if [ -n "$(git status --porcelain ../docs/api/openapi.json)" ]; then
          echo "Swagger docs (docs/api/openapi.json) are outdated. Please generate them locally and commit the changes."
          exit 1
        fi

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check Formatting
      run: npm run format:check
      
    - name: Lint
      run: npm run lint
      
    - name: Build
      run: npm run build
